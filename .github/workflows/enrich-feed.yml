name: Enrich top stories (tier 2)

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */3 * * *"

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run enrich crawl
        run: node scripts/crawl-news.mjs --mode enrich --maxItems 40

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dynamic-headlines.json crawler-state.json crawler-metrics.json enriched-top-stories.json
          git diff --cached --quiet || git commit -m "chore: enrich top stories"
          git push
