<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Levon Current Events Hub</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <header class="card hero">
      <h1>Current Events Hub <span>🍁</span></h1>
      <p>Fast links to major live news sources.</p>
      <p id="now" class="now"></p>
      <div class="row">
        <input id="filter" placeholder="Filter links (e.g., tech, world, business)" />
        <button id="clear">Clear</button>
      </div>
    </header>

    <section class="grid" id="cards"></section>

    <footer class="foot">
      <small>Tip: open multiple links in new tabs to create your daily briefing flow.</small><br />
      <small>Background photos sourced from Unsplash (free to use).</small>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
