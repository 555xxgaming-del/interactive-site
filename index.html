<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Levon Interactive Site</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <header class="card">
      <h1>Interactive Starter <span>🍁</span></h1>
      <p>Local-first, fast, and actually fun.</p>
    </header>

    <section class="grid">
      <article class="card">
        <h2>Counter</h2>
        <p id="count" class="big">0</p>
        <div class="row">
          <button id="dec">-1</button>
          <button id="inc">+1</button>
          <button id="reset">Reset</button>
        </div>
      </article>

      <article class="card">
        <h2>Theme + Accent</h2>
        <div class="row">
          <button id="theme">Toggle Theme</button>
          <input id="accent" type="color" value="#ff7a1a" title="Accent color" />
        </div>
      </article>

      <article class="card">
        <h2>Todo (saved locally)</h2>
        <form id="todoForm" class="row">
          <input id="todoInput" placeholder="Add task..." required />
          <button>Add</button>
        </form>
        <ul id="todos"></ul>
      </article>

      <article class="card">
        <h2>Live Message</h2>
        <input id="name" placeholder="Type your name" />
        <p id="hello">Hey there.</p>
      </article>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
